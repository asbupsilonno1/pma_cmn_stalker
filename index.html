	function badge(status) {
	  const cls = {"failed": "failed", "skipped": "skipped", "running": "running", "started": "started", "passed": "passed", "not_started": "not-started", "missing": "missing"}[status] || 'missing';
	return `<span class="badge ${cls}">${status.replace('_', ' ')}</span>`;
	}

	function htmlEscape(text) {
	  if (!text) return '';
	  return text
		.replaceAll('&', '&amp;')
		.replaceAll('<', '&lt;')
		.replaceAll('>', '&gt;')
		.replaceAll('"', '&quot;')
		.replaceAll("'", '&#39;');
	}

	function stageRows(run) {
	  return run.stages.map(stage => `
		<tr>
		  <td class="stage-name">${htmlEscape(stage.stage)}</td>
		  <td>${badge(stage.status)}</td>
		  <td>${stage.last_updated ? htmlEscape(stage.last_updated) : '<span class="empty">--</span>'}</td>
		  <td class="logline">${stage.latest_line ? htmlEscape(stage.latest_line) : '<span class="empty">No recent line</span>'}</td>
		</tr>
	  `).join('');
	}

	function detailBlocks(run) {
	  return run.stages.filter(stage => stage.recent_lines && stage.recent_lines.length).map(stage => `
		<details>
		  <summary>${htmlEscape(stage.stage)} recent log lines</summary>
		  <pre>${htmlEscape(stage.recent_lines.join('
'))}</pre>
		</details>
	  `).join('');
	}

	function summaryPills(run) {
	  const parts = [];
	  for (const [key, value] of Object.entries(run.summary)) {
		parts.push(`<span class="pill">${htmlEscape(key)}: ${value}</span>`);
	  }
	  if (run.running_stage) {
		parts.push(`<span class="pill">running stage: ${htmlEscape(run.running_stage)}</span>`);
	  }
	  return parts.join('');
	}

	function renderRun(run) {
	  return `
		<article class="card">
		  <div class="card-header">
			<div class="card-header-top">
			  <h2>${htmlEscape(run.label)}</h2>
			  ${badge(run.overall_status)}
			</div>
			<div class="meta">
			  <div><strong>Base path:</strong> ${htmlEscape(run.base_path)}</div>
			  <div><strong>Logs dir:</strong> ${htmlEscape(run.logs_dir)}</div>
			  <div><strong>Last updated:</strong> ${run.last_updated ? htmlEscape(run.last_updated) : '--'}</div>
			  <div><strong>fc_latest:</strong> ${run.fc_latest_line ? htmlEscape(run.fc_latest_line) : '<span class="empty">No fc_latest.log line</span>'}</div>
			</div>
			<div class="summary">${summaryPills(run)}</div>
		  </div>
		  <div class="section">
			<table>
			  <thead>
				<tr>
				  <th>Stage</th>
				  <th>Status</th>
				  <th>Last updated</th>
				  <th>Recent line</th>
				</tr>
			  </thead>
			  <tbody>
				${stageRows(run)}
			  </tbody>
			</table>
			${detailBlocks(run)}
		  </div>
		</article>
	  `;
	}

	document.getElementById('dashboard').innerHTML = snapshot.runs.map(renderRun).join('');
  </script>
</body>
</html>
